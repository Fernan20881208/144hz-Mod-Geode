name: Build Geode Launcher 144Hz v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Clonar Geode Android Launcher
        run: |
          git clone --depth 1 --recurse-submodules \
            https://github.com/geode-sdk/android-launcher.git launcher

      - name: Aplicar parche de 144 Hz
        working-directory: launcher
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path(".")

          def read(path: Path) -> str:
              return path.read_text(encoding="utf-8")

          def write(path: Path, text: str) -> None:
              path.write_text(text, encoding="utf-8")

          def replace_once(text: str, old: str, new: str, name: str) -> str:
              if old not in text:
                  raise RuntimeError(f"No se encontró el bloque: {name}")
              return text.replace(old, new, 1)

          def lines(*items: str) -> str:
              return "\n".join(items)

          # ---------------------------------------------------------------
          # 1) Game Mode: pedir a Android/OEM que NO aplique FPS throttling.
          # ---------------------------------------------------------------
          manifest = root / "app/src/main/AndroidManifest.xml"
          manifest_text = read(manifest)

          if 'android:name="android.game_mode_config"' not in manifest_text:
              application = re.search(
                  r"(<application\b[^>]*>)",
                  manifest_text,
                  re.DOTALL,
              )
              if not application:
                  raise RuntimeError(
                      "No se encontró <application> en AndroidManifest.xml"
                  )

              metadata = lines(
                  "",
                  "        <meta-data",
                  '            android:name="android.game_mode_config"',
                  '            android:resource="@xml/game_mode_config" />',
              )
              manifest_text = (
                  manifest_text[:application.end()]
                  + metadata
                  + manifest_text[application.end():]
              )
              write(manifest, manifest_text)

          xml_base = root / "app/src/main/res/xml"
          xml_base.mkdir(parents=True, exist_ok=True)
          write(
              xml_base / "game_mode_config.xml",
              lines(
                  '<?xml version="1.0" encoding="UTF-8"?>',
                  '<game-mode-config',
                  '    xmlns:android="http://schemas.android.com/apk/res/android" />',
                  "",
              ),
          )

          xml_v31 = root / "app/src/main/res/xml-v31"
          xml_v31.mkdir(parents=True, exist_ok=True)
          write(
              xml_v31 / "game_mode_config.xml",
              lines(
                  '<?xml version="1.0" encoding="UTF-8"?>',
                  '<game-mode-config',
                  '    xmlns:android="http://schemas.android.com/apk/res/android"',
                  '    android:supportsPerformanceGameMode="true"',
                  '    android:supportsBatteryGameMode="false" />',
                  "",
              ),
          )

          xml_v33 = root / "app/src/main/res/xml-v33"
          xml_v33.mkdir(parents=True, exist_ok=True)
          write(
              xml_v33 / "game_mode_config.xml",
              lines(
                  '<?xml version="1.0" encoding="UTF-8"?>',
                  '<game-mode-config',
                  '    xmlns:android="http://schemas.android.com/apk/res/android"',
                  '    android:supportsPerformanceGameMode="true"',
                  '    android:supportsBatteryGameMode="false"',
                  '    android:allowGameDownscaling="false"',
                  '    android:allowGameFpsOverride="false" />',
                  "",
              ),
          )

          # ---------------------------------------------------------------
          # 2) GLSurfaceView: solicitar el modeId exacto de mayor frecuencia.
          # ---------------------------------------------------------------
          surface_file = root / (
              "app/src/main/java/org/cocos2dx/lib/"
              "Cocos2dxGLSurfaceView.kt"
          )
          surface_text = read(surface_file)

          surface_pattern = re.compile(
              r"    @RequiresApi\(Build\.VERSION_CODES\.R\)\n"
              r"    fun updateRefreshRate\(\) \{.*?\n"
              r"    \}\n\n"
              r"    override fun onPause",
              re.DOTALL,
          )

          surface_replacement = lines(
              "    @RequiresApi(Build.VERSION_CODES.R)",
              "    fun updateRefreshRate() {",
              "        val chosenDisplay =",
              "            display.supportedModes?.maxByOrNull { it.refreshRate }",
              "        if (chosenDisplay == null) {",
              '            println("No se encontró un modo de pantalla")',
              "            return",
              "        }",
              "",
              "        val chosenRefreshRate = chosenDisplay.refreshRate",
              "        println(",
              '            "Force144Hz: ${chosenDisplay.modeId} " +',
              '                "@ $chosenRefreshRate Hz"',
              "        )",
              "",
              "        val surface = holder.surface",
              "        if (surface.isValid) {",
              "            if (Build.VERSION.SDK_INT >=",
              "                Build.VERSION_CODES.S",
              "            ) {",
              "                surface.setFrameRate(",
              "                    chosenRefreshRate,",
              "                    Surface.FRAME_RATE_COMPATIBILITY_DEFAULT,",
              "                    Surface.CHANGE_FRAME_RATE_ALWAYS,",
              "                )",
              "            } else {",
              "                surface.setFrameRate(",
              "                    chosenRefreshRate,",
              "                    Surface.FRAME_RATE_COMPATIBILITY_DEFAULT,",
              "                )",
              "            }",
              "        }",
              "",
              "        if (isAttachedToWindow) {",
              "            val activity = context as Activity",
              "            val attributes = activity.window.attributes",
              "            attributes.preferredDisplayModeId =",
              "                chosenDisplay.modeId",
              "            attributes.preferredRefreshRate =",
              "                chosenRefreshRate",
              "            activity.window.attributes = attributes",
              "        }",
              "    }",
              "",
              "    override fun onPause",
          )

          surface_text, surface_count = surface_pattern.subn(
              surface_replacement,
              surface_text,
              count=1,
          )
          if surface_count != 1:
              raise RuntimeError(
                  "No se pudo reemplazar updateRefreshRate()"
              )
          write(surface_file, surface_text)

          # ---------------------------------------------------------------
          # 3) Activity: fijar modeId al arrancar y reaplicar al volver al foco.
          # ---------------------------------------------------------------
          activity_file = root / (
              "app/src/main/java/com/geode/launcher/"
              "GeometryDashActivity.kt"
          )
          activity_text = read(activity_file)

          activity_text = replace_once(
              activity_text,
              "                window.attributes.preferredRefreshRate = "
              "chosenRefreshRate",
              lines(
                  "                val attributes = window.attributes",
                  "                attributes.preferredDisplayModeId =",
                  "                    chosenDisplay.modeId",
                  "                attributes.preferredRefreshRate =",
                  "                    chosenRefreshRate",
                  "                window.attributes = attributes",
              ),
              "preferredDisplayModeId inicial",
          )

          old_focus = lines(
              "    override fun onWindowFocusChanged(",
              "        hasWindowFocus: Boolean",
              "    ) {",
              "        super.onWindowFocusChanged(hasWindowFocus)",
              "        mHasWindowFocus = hasWindowFocus",
              "        if (hasWindowFocus && !mIsOnPause) {",
              "            resumeGame()",
              "        }",
              "",
              "        hideSystemUi()",
              "    }",
          )

          # Compatibilidad con la firma actual en una sola línea.
          old_focus_single = lines(
              "    override fun onWindowFocusChanged(hasWindowFocus: Boolean) {",
              "        super.onWindowFocusChanged(hasWindowFocus)",
              "        mHasWindowFocus = hasWindowFocus",
              "        if (hasWindowFocus && !mIsOnPause) {",
              "            resumeGame()",
              "        }",
              "",
              "        hideSystemUi()",
              "    }",
          )

          new_focus = lines(
              "    override fun onWindowFocusChanged(hasWindowFocus: Boolean) {",
              "        super.onWindowFocusChanged(hasWindowFocus)",
              "        mHasWindowFocus = hasWindowFocus",
              "        if (hasWindowFocus && !mIsOnPause) {",
              "            resumeGame()",
              "        }",
              "",
              "        if (hasWindowFocus && Build.VERSION.SDK_INT >=",
              "            Build.VERSION_CODES.R",
              "        ) {",
              "            mGLSurfaceView?.post {",
              "                mGLSurfaceView?.updateRefreshRate()",
              "            }",
              "        }",
              "",
              "        hideSystemUi()",
              "    }",
          )

          if old_focus_single in activity_text:
              activity_text = activity_text.replace(
                  old_focus_single,
                  new_focus,
                  1,
              )
          elif old_focus in activity_text:
              activity_text = activity_text.replace(
                  old_focus,
                  new_focus,
                  1,
              )
          else:
              raise RuntimeError(
                  "No se encontró onWindowFocusChanged()"
              )

          old_resume = lines(
              "    override fun onResume() {",
              "        super.onResume()",
              "        mIsOnPause = false",
              "        BaseRobTopActivity.isPaused = false",
              "        if (mHasWindowFocus && !this.mIsRunning) {",
              "            resumeGame()",
              "        }",
              "    }",
          )

          new_resume = lines(
              "    override fun onResume() {",
              "        super.onResume()",
              "        mIsOnPause = false",
              "        BaseRobTopActivity.isPaused = false",
              "        if (mHasWindowFocus && !this.mIsRunning) {",
              "            resumeGame()",
              "        }",
              "",
              "        if (Build.VERSION.SDK_INT >=",
              "            Build.VERSION_CODES.R",
              "        ) {",
              "            // Reaplicar después de que el servicio OEM",
              "            // intente establecer su política por UID.",
              "            mGLSurfaceView?.post {",
              "                mGLSurfaceView?.updateRefreshRate()",
              "            }",
              "            mGLSurfaceView?.postDelayed(",
              "                { mGLSurfaceView?.updateRefreshRate() },",
              "                500L,",
              "            )",
              "            mGLSurfaceView?.postDelayed(",
              "                { mGLSurfaceView?.updateRefreshRate() },",
              "                1500L,",
              "            )",
              "        }",
              "    }",
          )

          activity_text = replace_once(
              activity_text,
              old_resume,
              new_resume,
              "onResume()",
          )
          write(activity_file, activity_text)

          # ---------------------------------------------------------------
          # 4) Asegurar el linker correcto para objetos Android ARM.
          # ---------------------------------------------------------------
          cmake_file = root / "app/src/main/cpp/CMakeLists.txt"
          cmake_text = read(cmake_file)

          # Esta biblioteca es pequeña. Desactivar IPO evita que LTO
          # introduzca herramientas del host durante el enlace cruzado.
          cmake_text = cmake_text.replace(
              "INTERPROCEDURAL_OPTIMIZATION ON",
              "INTERPROCEDURAL_OPTIMIZATION OFF",
          )

          # Obligar a Clang a usar LLVM lld, compatible con AArch64/ARM.
          if "target_link_options(launcherfix" not in cmake_text:
              cmake_text += lines(
                  "",
                  "# Force LLVM lld for Android cross-compilation.",
                  'target_link_options(launcherfix PRIVATE "-fuse-ld=lld")',
                  "",
              )

          write(cmake_file, cmake_text)

          # ---------------------------------------------------------------
          # 5) Distinguir claramente esta compilación.
          # ---------------------------------------------------------------
          gradle_file = root / "app/build.gradle.kts"
          gradle_text = read(gradle_file)

          gradle_text, version_name_count = re.subn(
              r'versionName\s*=\s*"[^"]+"',
              'versionName = "1.8.0-144hz"',
              gradle_text,
              count=1,
          )
          gradle_text, version_code_count = re.subn(
              r"versionCode\s*=\s*\d+",
              "versionCode = 290144",
              gradle_text,
              count=1,
          )

          if version_name_count != 1 or version_code_count != 1:
              raise RuntimeError(
                  "No se pudo modificar versionName/versionCode"
              )
          write(gradle_file, gradle_text)

          print("Parche Force 144 Hz aplicado correctamente.")
          PY

      - name: Instalar clave fija de prueba
        env:
          DEBUG_KEYSTORE_B64: ""
        run: |
          mkdir -p "$HOME/.android"
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 --decode \
            > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
          keytool -list \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compilar APK estándar
        working-directory: launcher
        shell: bash
        run: |
          # Evitar que variables del host sustituyan al toolchain del NDK.
          unset CC CXX LD AR AS NM RANLIB

          chmod +x gradlew

          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ./gradlew --version

          # Mismo task usado por el workflow oficial de Geode.
          ./gradlew \
            --no-daemon \
            --stacktrace \
            --info \
            app:assembleStandardDebug

      - name: Mostrar archivos generados
        run: |
          find launcher/app/build/outputs/apk/standard/debug \
            -type f -name '*.apk' \
            -print -exec sha256sum {} \;

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Geode-Launcher-144Hz-v2
          path: launcher/app/build/outputs/apk/standard/debug/*.apk
          if-no-files-found: error
          retention-days: 30
          
