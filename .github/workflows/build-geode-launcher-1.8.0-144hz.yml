name: Build Geode Launcher 1.8.0 144Hz

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-geode-launcher-1.8.0-144hz.yml"
      - "scripts/patch-geode-launcher-144hz.py"

permissions:
  contents: read

concurrency:
  group: geode-launcher-1.8.0-144hz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      LAUNCHER_COMMIT: "38bc97b7b6551acb1295dd241231ca22e2cd8995"
      TARGET_REFRESH_RATE: "144.0"
      LAUNCHER_DIR: "launcher"

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Geode Android Launcher 1.8.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: geode-sdk/android-launcher
          ref: ${{ env.LAUNCHER_COMMIT }}
          path: launcher
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Verify launcher source revision
        shell: bash
        run: |
          set -euxo pipefail
          ACTUAL_COMMIT="$(git -C launcher rev-parse HEAD)"
          test "$ACTUAL_COMMIT" = "$LAUNCHER_COMMIT"
          git -C launcher status --short

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            launcher/*.gradle*
            launcher/gradle/wrapper/gradle-wrapper.properties
            launcher/app/*.gradle*

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install exact Android toolchain
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"

      - name: Apply RMX5106 144 Hz patch
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/patch-geode-launcher-144hz.py
          git -C launcher diff --check
          git -C launcher diff --stat
          git -C launcher diff > launcher-144hz.patch
          test -s launcher-144hz.patch

      - name: Build debug APKs
        working-directory: launcher
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace app:assembleDebug \
            2>&1 | tee build-144hz.log

      - name: Prepare APK artifacts
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release

          find launcher/app/build/outputs/apk/debug \
            -type f -name '*.apk' -print0 \
            | while IFS= read -r -d '' apk; do
                cp "$apk" "release/$(basename "$apk")"
              done

          cp launcher/build-144hz.log release/build-144hz.log
          cp launcher-144hz.patch release/launcher-144hz.patch

          APK_COUNT="$(find release -maxdepth 1 -type f -name '*.apk' | wc -l)"
          test "$APK_COUNT" -gt 0

          (cd release && sha256sum *.apk > SHA256SUMS.txt)
          cat release/SHA256SUMS.txt

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Geode-Launcher-1.8.0-144Hz-failure-log
          path: |
            launcher/build-144hz.log
            launcher-144hz.patch
          if-no-files-found: warn
          retention-days: 7

      - name: Upload patched APKs
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Geode-Launcher-1.8.0-144Hz-RMX5106
          path: |
            release/*.apk
            release/SHA256SUMS.txt
            release/build-144hz.log
            release/launcher-144hz.patch
          if-no-files-found: error
          retention-days: 30
