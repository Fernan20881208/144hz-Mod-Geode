name: Build Geode144 Shizuku APK

on:
  workflow_dispatch:
  push:
    branches:
      - geode144-shizuku
    paths:
      - "shizuku-app/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches:
      - main
    paths:
      - "shizuku-app/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Compilar APK debug
        working-directory: shizuku-app
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Mostrar APK y hash
        run: |
          find shizuku-app/app/build/outputs/apk/debug -name '*.apk' \
            -print -exec sha256sum {} \;

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Geode144-Shizuku-APK
          path: shizuku-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
